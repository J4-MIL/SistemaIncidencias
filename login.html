<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | TechSolutions</title>
<link rel="stylesheet" href="assets/css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="auth-login-page">

<div class="auth-wrapper">
  <div class="auth-box">

    <!-- Panel decorativo -->
    <div class="auth-deco" aria-hidden="true">
      <div class="deco-ring deco-ring--1"></div>
      <div class="deco-ring deco-ring--2"></div>
      <div class="deco-content">
        <div class="deco-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3Z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
        <p class="deco-logo">TechSolutions</p>
        <p class="deco-sub">Sistema de Incidencias</p>
        <div class="deco-divider"></div>
        <p class="deco-tagline">Gestiona, asigna y da seguimiento a incidencias de soporte técnico en un solo lugar.</p>
      </div>
    </div>

    <!-- Panel del formulario -->
    <div class="auth-form-panel">

      <div class="auth-tabs" role="tablist">
        <button type="button" role="tab" aria-selected="true" class="auth-tab auth-tab--active">Iniciar sesión</button>
        <a href="register.html" role="tab" aria-selected="false" class="auth-tab">Registrarse</a>
      </div>

      <h2 class="auth-title">¡Bienvenido de vuelta!</h2>
      <p class="auth-hint">Ingresa tus credenciales para acceder al sistema</p>

      <div id="loginAlert"></div>

      <form id="loginForm" novalidate>

        <div class="auth-field">
          <span class="auth-field__icon">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="correo" name="correo" placeholder="Correo electrónico" autocomplete="username" value="admin@empresa.com" required>
        </div>

        <div class="auth-field">
          <span class="auth-field__icon">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" autocomplete="current-password" value="admin123" required>
          <button type="button" id="togglePass" class="auth-field__toggle">Ver</button>
        </div>

        <button type="submit" class="btn-main" id="btnLogin">
          <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
          Ingresar
        </button>
      </form>

      <div class="auth-ornament">
        <span class="orn-line"></span><span class="orn-symbol">✦</span><span class="orn-line"></span>
      </div>

      <p class="auth-toggle">¿No tienes una cuenta? <a href="register.html">Regístrate</a></p>
    </div>

  </div>
</div>

<script type="module" src="assets/js/app-login.js"></script>
</body>
</html>
